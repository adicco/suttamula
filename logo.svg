<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 160" width="600" height="160">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b8860b"/>
      <stop offset="50%" style="stop-color:#daa520"/>
      <stop offset="100%" style="stop-color:#b8860b"/>
    </linearGradient>
    <linearGradient id="leaf" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8b7355"/>
      <stop offset="50%" style="stop-color:#a0956b"/>
      <stop offset="100%" style="stop-color:#8b7355"/>
    </linearGradient>
  </defs>

  <!-- Palm leaf manuscript shape -->
  <rect x="30" y="35" width="540" height="90" rx="45" ry="45" fill="url(#leaf)" opacity="0.12"/>

  <!-- Dhamma wheel -->
  <g transform="translate(80, 80)">
    <!-- Outer ring -->
    <circle cx="0" cy="0" r="38" fill="none" stroke="url(#gold)" stroke-width="2.5"/>
    <!-- Inner ring -->
    <circle cx="0" cy="0" r="14" fill="none" stroke="url(#gold)" stroke-width="2"/>
    <!-- Hub -->
    <circle cx="0" cy="0" r="4" fill="url(#gold)"/>
    <!-- 8 spokes at 0, 45, 90, 135, 180, 225, 270, 315 degrees -->
    <line x1="0" y1="-14" x2="0" y2="-38" stroke="url(#gold)" stroke-width="2"/>
    <line x1="9.9" y1="-9.9" x2="26.9" y2="-26.9" stroke="url(#gold)" stroke-width="2"/>
    <line x1="14" y1="0" x2="38" y2="0" stroke="url(#gold)" stroke-width="2"/>
    <line x1="9.9" y1="9.9" x2="26.9" y2="26.9" stroke="url(#gold)" stroke-width="2"/>
    <line x1="0" y1="14" x2="0" y2="38" stroke="url(#gold)" stroke-width="2"/>
    <line x1="-9.9" y1="9.9" x2="-26.9" y2="26.9" stroke="url(#gold)" stroke-width="2"/>
    <line x1="-14" y1="0" x2="-38" y2="0" stroke="url(#gold)" stroke-width="2"/>
    <line x1="-9.9" y1="-9.9" x2="-26.9" y2="-26.9" stroke="url(#gold)" stroke-width="2"/>
  </g>

  <!-- Title text -->
  <text x="140" y="72" font-family="Georgia, 'Times New Roman', serif" font-size="32" font-weight="bold" fill="#000000" letter-spacing="1">Suttamūla</text>

  <!-- Subtitle -->
  <text x="140" y="100" font-family="Georgia, 'Times New Roman', serif" font-size="14" fill="#555555" letter-spacing="2" font-style="italic">Pali Canon Translations — Early Buddhism First</text>
</svg>
